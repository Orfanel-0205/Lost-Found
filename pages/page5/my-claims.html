<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Claims | UNIFIND</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../page4/home.html" class="nav-brand">
      <img src="../page5/img/asan_kaya__1_-removebg-preview.png" class="nav-logo-img" alt="UNIFIND">
      <span>UNI<span class="brand-accent">FIND</span></span>
    </a>

    <div class="nav-links">
      <a href="../page4/home.html" class="nav-link">
        <i class="fa-solid fa-house"></i> Home
      </a>
      <a href="../page1/report.html" class="nav-link">
        <i class="fa-solid fa-file-circle-exclamation"></i> Report
      </a>
      
      </a>
      <a href="../page5/my-claims.html" class="nav-link active">
        <i class="fa-solid fa-gavel"></i> Submit Claim
      </a>
      <a href="../page3/dashboard.html" class="nav-link" id="dashboardLink" style="display:none">
        <i class="fa-solid fa-chart-column"></i> Dashboard
      </a>
    </div>

    <div class="nav-user">
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">Loading…</div>
          <div class="user-role" id="userRole">Student</div>
        </div>
      </div>
      <button class="btn-signout" onclick="doLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>
  </nav>

  <div class="page-container">
    <div class="page-header">
      <div class="page-header-inner">
        <h1 class="page-title">Proof of <span>Ownership</span></h1>
        <p class="page-subtitle">Submit your statement and proof image to claim an item.</p>
      </div>
    </div>

    <div class="statement-form">
      <form id="statement-form" enctype="multipart/form-data">
        <div class="form-group">
          <label for="description">Proof of Ownership Statement</label>
          <textarea
            id="description"
            name="description"
            rows="6"
            placeholder="Describe the item in detail. Include unique marks, contents, color, brand, date lost, or any identifying proof."
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="image">Upload Proof Image</label>
          <input type="file" id="image" name="image" accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit">Submit Claim</button>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../../assets/js/utils.js"></script>
  <script src="./assets/js/scripts.js"></script>
</body>
</html>
