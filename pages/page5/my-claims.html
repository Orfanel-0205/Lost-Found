<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Claims | UNIFIND</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
 
  <!-- ═══ NAVBAR ════════════════════════════════════════════════════════ -->
  <nav class="navbar">
 
    <!-- Left: Brand -->
    <a href="../page4/home.html" class="nav-brand">
      <img src="../../assets/img/asan_kaya__1_-removebg-preview.png" class="nav-logo-img" alt="UNIFIND">
      <span>UNI<span class="brand-accent">FIND</span></span>
    </a>
 
    <!-- Center: Page links -->
    <div class="nav-links">
      <a href="../page4/home.html" class="nav-link">
        <i class="fa-solid fa-house"></i> Home
      </a>
      <a href="../page1/report.html" class="nav-link">
        <i class="fa-solid fa-file-circle-exclamation"></i> Report
      </a>
      <a href="../page5/my-claims.html" class="nav-link active">
        <i class="fa-solid fa-hand-holding-heart"></i> My Claims
      </a>
      <!-- Shown only for staff via JS -->
      <a href="../page3/dashboard.html" class="nav-link" id="dashboardLink" style="display:none">
        <i class="fa-solid fa-chart-column"></i> Dashboard
      </a>
    </div>
 
    <!-- Right: User info + sign out -->
    <div class="nav-user">
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">Loading…</div>
          <div class="user-role" id="userRole">Student</div>
        </div>
      </div>
      <button class="btn-signout" onclick="doLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>
 
  </nav>
 
  <!-- ═══ PAGE CONTENT ═══════════════════════════════════════════════════ -->
  <div class="page-container">
 
    <!-- Page header banner -->
    <div class="page-header">
      <div class="page-header-inner">
        <h1 class="page-title">My <span>Claims</span></h1>
        <p class="page-subtitle">Track the status of all your submitted claim requests</p>
      </div>
    </div>
 
    <!-- Filter tabs -->
    <div class="section-tabs">
      <button class="section-tab active" onclick="filterClaims('all', this)">
        <i class="fa-solid fa-list"></i> All
      </button>
      <button class="section-tab" onclick="filterClaims('pending', this)">
        <i class="fa-solid fa-hourglass-half"></i> Pending
      </button>
      <button class="section-tab" onclick="filterClaims('approved', this)">
        <i class="fa-solid fa-circle-check"></i> Approved
      </button>
      <button class="section-tab" onclick="filterClaims('rejected', this)">
        <i class="fa-solid fa-circle-xmark"></i> Rejected
      </button>
    </div>
 
    <!-- Claims grid -->
    <div id="claimsList" class="claims-list">
      <div class="loading-spinner"></div>
    </div>
 
  </div

  <div class="toast-container" id="toastContainer"></div>

  <script src="../../assets/js/utils.js"></script>
  <script src="../page5/assets/js/scripts.js"></script>

 </body>
</html>
