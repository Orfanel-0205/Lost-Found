<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Claims | UNIFIND</title>
  <link rel="stylesheet" href="../page5/assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../page4/home.html" class="nav-brand">
      <img src="../../assets/img/asan_kaya__1_-removebg-preview.png" class="nav-logo-img" alt="UNIFIND Logo">
      <span>UNI<span>FIND</span></span>
    </a>

    <div class="nav-links">
      <a href="../page4/home.html" class="nav-link">
        <i class="fa-solid fa-house"></i> Home
      </a>
      <a href="../page1/report.html" class="nav-link">
        <i class="fa-solid fa-file-circle-exclamation"></i> Report
      </a>
      <a href="my-claims.html" class="nav-link active">
        <i class="fa-solid fa-hand-holding-heart"></i> My Claims
      </a>
      <a href="../page3/dashboard.html" class="nav-link" id="dashboardLink" style="display:none;">
        <i class="fa-solid fa-chart-column"></i> Dashboard
      </a>
    </div>

    <div class="nav-user">
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">Student</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">My <span>Claims</span></h1>
      <p class="page-subtitle">Track the status of all your submitted claims</p>
    </div>
    
    <div class="section-tabs">
        <button class="section-tab active" onclick="filterClaims('all', this)">All</button>
        <button class="section-tab" onclick="filterClaims('pending', this)">⏳ Pending</button>
        <button class="section-tab" onclick="filterClaims('approved', this)">✅ Approved</button>
        <button class="section-tab" onclick="filterClaims('rejected', this)">❌ Rejected</button>
    </div>

    <!-- CLAIMS LIST -->
    <div id="claimsList" class="claims-list">
        <div class="loading-spinner"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../../assets/js/utils.js"></script>
  <script src="../page5/assets/js/scripts.js"></script>

 </body>
</html>
