<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Claim | UNIFIND</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../page4/home.html" class="nav-brand">
      <img src="assets/img/asan_kaya__1_-removebg-preview.png" class="nav-logo-img" alt="UNIFIND Logo">
      <span>UNI<span>FIND</span></span>
    </a>
    <div class="nav-links">
      <a href="../page4/home.html" class="nav-link">
        <i class="fa-solid fa-house"></i> Home
      </a>
      <a href="../page1/report.html" class="nav-link">
        <i class="fa-solid fa-file-circle-exclamation"></i> Report
      </a>
      <a href="../page5/my-claims.html" class="nav-link">
        <i class="fa-solid fa-hand-holding-heart"></i> My Claims
      </a>
      <a href="../page3/dashboard.html" class="nav-link" id="dashboardLink" style="display:none;">
        <i class="fa-solid fa-chart-column"></i> Dashboard
      </a>
    </div>
    <div class="nav-user">
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">Student</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Submit a <span>Claim</span></h1>
      <p class="page-subtitle">Provide proof of ownership for the item you wish to claim.</p>
    </div>

    <div class="claim-submission-grid">
      <div class="item-details-card">
        <h3>Item You Are Claiming</h3>
        <div id="itemDetails">
          <p>Loading item details...</p>
        </div>
      </div>
      <div class="claim-form-card">
        <h3>Your Proof of Ownership</h3>
        <form id="claimForm">
          <div class="form-group">
            <label for="proofDescription">
              Describe why you believe this is your item. Include any unique identifying marks, contents, or features.
            </label>
            <textarea id="proofDescription" rows="6" placeholder="e.g., 'This is my wallet because it has a picture of my dog inside and a scratch on the corner.'"></textarea>
          </div>
          <div class="form-group">
            <label for="proofImage">
              Upload a supporting image (optional)
            </label>
            <p class="form-hint">This could be a photo of you with the item, a receipt, or any other visual proof.</p>
            <input type="file" id="proofImage" accept="image/*">
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-paper-plane"></i>
            Submit Claim
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../../assets/js/utils.js"></script>
  <script src="assets/js/scripts.js"></script>
</body>
</html>
