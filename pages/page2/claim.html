<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../page2/assets/css/style.css">
</head>
<body>
<nav class="navbar">
    <a href="../../index.html" class="nav-brand">
      <img src="../page1/assets/img/asan_kaya__1_-removebg-preview.png" class="nav-logo-img" alt="UNIFIND Logo">
      <span>UNI<span>FIND</span></span>
    </a>
    <div class="nav-links">
      <a href="../../index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
      <a href="../page1/report.html" class="nav-link active"><i class="fa-solid fa-file-circle-exclamation"></i> Report</a>
      <a href="../page2/claim.html" class="nav-link"><i class="fa-solid fa-hand-holding-heart"></i> Claim</a>
      <a href="../page3/dashboard.html" class="nav-link"><i class="fa-solid fa-chart-column"></i> Dashboard</a>
    </div>
  </nav>
 <div class="nav-user">
      <div class="user-badge">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">—</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">My <span>Claims</span></h1>
      <p class="page-subtitle">Track the status of all your submitted claims</p>
    </div>

    <div class="section-tabs">
      <button class="section-tab active" onclick="filterClaims('all')">All</button>
      <button class="section-tab" onclick="filterClaims('pending')">⏳ Pending</button>
      <button class="section-tab" onclick="filterClaims('approved')">✅ Approved</button>
      <button class="section-tab" onclick="filterClaims('rejected')">❌ Rejected</button>
    </div>

    <div id="claimsList" class="claims-list">
      <div class="empty-state">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
